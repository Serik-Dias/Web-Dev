<div style="margin-bottom: 20px; border: 1px solid #999; padding: 10px; background: #eee;">
  <h3>Добавить новый альбом</h3>
  <input [(ngModel)]="newAlbumTitle" placeholder="Название альбома" type="text">
  <button (click)="addAlbum()">Создать</button>
</div>
<h2>My Albums</h2>
<ul class="album-list">
  <li *ngFor="let album of albums" class="album-item">
    <span class="album-title">{{ album.id }}. {{ album.title }}</span>
    <div class="actions">
      <a [routerLink]="['/albums', album.id]" class="btn-open">Open</a>
      <button (click)="deleteAlbum(album.id)" class="btn-delete">Delete</button>
    </div>
  </li>
</ul>
